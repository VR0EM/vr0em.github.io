<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SASE — Network Architecture Diagram Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #f8fafc;
    color: #0f172a;
    overscroll-behavior: none;
  }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  /* Hide scrollbars on the canvas wrapper */
  .no-scroll::-webkit-scrollbar { display: none; }
  /* Subtle scrollbar for panels */
  .thin-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
  .thin-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  .thin-scroll::-webkit-scrollbar-track { background: transparent; }
  input[type="text"], input[type="number"], select, textarea {
    font-family: inherit;
  }
  /* Prevent text selection while dragging on canvas */
  .dragging, .dragging * { user-select: none !important; cursor: grabbing !important; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react" src="src/icons.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/types.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/seed.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/reducer.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/routing.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/canvas.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/panels.jsx"></script>
<script type="text/babel" data-presets="env,react" src="src/app.jsx"></script>
</body>
</html>
